<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sasani Music</title>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0c14;
      --bg2:        #141020;
      --bg3:        #1a1528;
      --surface:    #1f1a30;
      --border:     #2e2845;
      --pink:       #f0a0b8;
      --pink-dim:   #a05878;
      --pink-glow:  rgba(240,160,184,0.15);
      --teal:       #7dcfbf;
      --teal-dim:   #4a9e90;
      --lavender:   #b8a8d8;
      --text:       #e8e0f0;
      --text-soft:  #a898c0;
      --text-dim:   #6a5f80;
      --star:       rgba(240,160,184,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; border-radius: 50%; background: var(--star); animation: twinkle var(--d, 3s) ease-in-out infinite alternate; }
    @keyframes twinkle { from { opacity: 0.1; transform: scale(0.8); } to { opacity: 0.7; transform: scale(1.2); } }

    /* ── NAV ── */
    nav {
      position: relative; z-index: 10;
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; color: var(--text-dim);
    }
    nav a { color: var(--pink-dim); text-decoration: none; transition: color 0.2s; }
    nav a:hover { color: var(--pink); }

    /* ── HEADER ── */
    header { position: relative; z-index: 10; text-align: center; padding: 3.5rem 2rem 2.5rem; }

    .icon-bubble {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface); border: 2px solid var(--pink-dim);
      box-shadow: 0 0 24px var(--pink-glow), inset 0 0 16px rgba(240,160,184,0.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; margin: 0 auto 1rem;
      animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 700; color: var(--text); animation: fadeUp 0.7s ease 0.1s both; }
    .subtitle { margin-top: 0.4rem; font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal-dim); animation: fadeUp 0.7s ease 0.2s both; }

    /* ── ABOUT ── */
    .instrument-about {
      position: relative; z-index: 10;
      max-width: 700px; margin: 2.5rem auto;
      padding: 2rem 2.5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-top: 2px solid var(--teal); border-radius: 16px;
      animation: fadeUp 0.7s ease 0.25s both;
    }
    .instrument-about h2 { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--teal-dim); margin-bottom: 0.75rem; }
    .instrument-about p { font-size: 0.95rem; color: var(--text-soft); margin-bottom: 0.75rem; }
    .instrument-about p:last-of-type { margin-bottom: 0; }
    .ref-link { display: inline-block; margin-top: 0.9rem; font-size: 0.72rem; color: var(--text-dim); text-decoration: none; letter-spacing: 0.08em; }
    .ref-link:hover { color: var(--pink); }

    /* ── PIECES ── */
    .section-wrap { position: relative; z-index: 10; max-width: 820px; margin: 0 auto 5rem; padding: 0 2rem; }

    .genre-group { margin-bottom: 2.5rem; }

    .genre-label {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--pink); margin-bottom: 1rem; padding: 0.2rem 0.8rem;
      background: rgba(240,160,184,0.07); border-radius: 20px;
      border: 1px solid rgba(240,160,184,0.15);
    }

    .piece {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 0.85rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .piece:hover { border-color: var(--pink-dim); background: var(--surface); }

    .piece-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem;
    }
    .piece-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .piece-composer { font-size: 0.82rem; color: var(--text-soft); }
    .piece-composer a { color: var(--teal-dim); text-decoration: none; transition: color 0.2s; }
    .piece-composer a:hover { color: var(--teal); }

    .piece-notes {
      font-size: 0.78rem; color: var(--text-dim);
      font-style: italic; margin-top: 0.5rem;
    }

    .variant { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .variant-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lavender); margin-bottom: 0.5rem; }

    .controls { display: flex; align-items: center; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 0.5rem; }
    .controls:last-child { margin-bottom: 0; }

    .btn-pdf {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.35rem 0.85rem;
      background: rgba(240,160,184,0.08); border: 1px solid var(--pink-dim);
      border-radius: 20px; font-size: 0.75rem; font-family: inherit;
      color: var(--pink); text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s; white-space: nowrap;
    }
    .btn-pdf:hover { background: rgba(240,160,184,0.16); box-shadow: 0 0 10px var(--pink-glow); }

    audio { height: 32px; flex: 1; min-width: 200px; accent-color: var(--pink); }

    /* ── STATES ── */
    .loading {
      text-align: center; padding: 4rem 2rem;
      color: var(--text-dim); font-size: 0.9rem; letter-spacing: 0.1em;
      position: relative; z-index: 10;
    }

    .error {
      text-align: center; padding: 2rem;
      color: var(--rose, #c47a8a); font-size: 0.9rem;
      position: relative; z-index: 10;
    }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 10; text-align: center;
      padding: 2rem; border-top: 1px solid var(--border);
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim);
    }
    footer a { color: var(--pink-dim); text-decoration: none; }
    footer a:hover { color: var(--pink); }
    .footer-heart { color: var(--pink); }

    /* ── ANIMATIONS ── */
    @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .instrument-about { margin: 2rem 1rem; padding: 1.5rem; }
      .section-wrap { padding: 0 1rem; }
      .piece-header { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="stars" aria-hidden="true" id="stars"></div>

  <nav>
    <a href="../../index.html">Sasani Music</a>
    <span>›</span>
    <span id="nav-title">Loading…</span>
  </nav>

  <header>
    <div class="icon-bubble" id="header-icon">𝄞</div>
    <h1 id="header-title">Loading…</h1>
    <p class="subtitle" id="header-subtitle"></p>
  </header>

  <section class="instrument-about" id="about-section">
    <h2>About this instrument</h2>
    <h3>UNDER CONSTRUCTION</h3>
    <h3>More music soon!</h3>
    <div id="about-text"></div>
    <a class="ref-link" href="../../references.html">Sources &amp; references →</a>
  </section>

  <div id="piece-list">
    <div class="loading">Loading pieces…</div>
  </div>

  <footer>
    <p>made with <span class="footer-heart">♡</span> · <a href="../../index.html">sasani music</a> · <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">cc by-nc-sa 4.0</a></p>
  </footer>

  <script>
    // ── STARFIELD ──
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 1;
      s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;`;
      starsEl.appendChild(s);
    }

    // ── COMPOSER HTML ──
    function linked(name, url) {
      return url ? `<a href="${url}" target="_blank" rel="noopener">${name}</a>` : name;
    }

    function makeComposerHtml(piece) {
      const parts = [];

      if (piece.composer) {
        const name = linked(piece.composer, piece.composerUrl);
        parts.push(piece.performer ? `${name} (composer)` : name);
      }

      if (piece.arranger) {
        parts.push(`arr. ${linked(piece.arranger, piece.arrangerUrl)}`);
      }

      if (piece.performer) {
        parts.push(`perf. ${linked(piece.performer, piece.performerUrl)}`);
      }

      if (piece.traditional) {
        parts.push(piece.traditional);
      }

      return parts.join(' / ');
    }

    // ── FILE BUTTONS ──
    function makeFilesHtml(files) {
      if (!files) return '';
      const btns = [];

      if (files.staff && files.tabs) {
        btns.push(`<a class="btn-pdf" href="./${files.staff}" target="_blank">📄 Staff</a>`);
        btns.push(`<a class="btn-pdf" href="./${files.tabs}" target="_blank">📄 Tabs</a>`);
      } else if (files.staffAndTabs) {
        btns.push(`<a class="btn-pdf" href="./${files.staffAndTabs}" target="_blank">📄 Staff + Tabs</a>`);
      } else if (files.staff) {
        btns.push(`<a class="btn-pdf" href="./${files.staff}" target="_blank">📄 Sheet Music</a>`);
      } else if (files.tabs) {
        btns.push(`<a class="btn-pdf" href="./${files.tabs}" target="_blank">📄 Tabs</a>`);
      }

      if (files.bassClef)   btns.push(`<a class="btn-pdf" href="./${files.bassClef}" target="_blank">📄 Bass Clef</a>`);
      if (files.trebleClef) btns.push(`<a class="btn-pdf" href="./${files.trebleClef}" target="_blank">📄 Treble Clef</a>`);
      if (files.jianpu)     btns.push(`<a class="btn-pdf" href="./${files.jianpu}" target="_blank">📄 Jianpu</a>`);

      let html = `<div class="controls">${btns.join('')}`;
      if (files.mp3) html += `<audio controls src="./${files.mp3}"></audio>`;
      html += `</div>`;
      return html;
    }

    // ── PIECE HTML ──
    function makePieceHtml(piece) {
      const composerHtml = makeComposerHtml(piece);
      let html = `
        <div class="piece">
          <div class="piece-header">
            <span class="piece-title">${piece.title}</span>
            ${composerHtml ? `<span class="piece-composer">${composerHtml}</span>` : ''}
          </div>
          ${makeFilesHtml(piece.files)}`;

      if (piece.variants) {
        for (const v of piece.variants) {
          html += `
          <div class="variant">
            <p class="variant-label">✦ ${v.label}</p>
            ${makeFilesHtml(v.files)}
          </div>`;
        }
      }

      if (piece.notes) {
        html += `<p class="piece-notes">${piece.notes}</p>`;
      }

      html += `</div>`;
      return html;
    }

    // ── LOAD & RENDER ──
    async function loadPieces() {
      try {
        const res = await fetch('./pieces.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Header
        const name = data.instrument.name;
        document.title = `${name} — Sasani Music`;
        document.getElementById('nav-title').textContent = name;
        document.getElementById('header-icon').textContent = data.instrument.icon || '🎵';
        document.getElementById('header-title').textContent = name;
        document.getElementById('header-subtitle').textContent = data.instrument.subtitle || '';

        // Description — supports multiple paragraphs as array or single string
        const aboutEl = document.getElementById('about-text');
        const desc = data.instrument.description;
        if (Array.isArray(desc)) {
          aboutEl.innerHTML = desc.map(p => `<p>${p}</p>`).join('');
        } else {
          aboutEl.innerHTML = `<p>${desc}</p>`;
        }

        // Group pieces by genre preserving defined order
        const grouped = {};
        for (const g of data.genres) grouped[g.id] = [];
        for (const piece of data.pieces) {
          if (!grouped[piece.genre]) grouped[piece.genre] = [];
          grouped[piece.genre].push(piece);
        }

        // Build piece list
        const wrap = document.getElementById('piece-list');
        let html = '<div class="section-wrap">';
        for (const genre of data.genres) {
          const pieces = grouped[genre.id];
          if (!pieces || pieces.length === 0) continue;
          html += `<div class="genre-group">
            <p class="genre-label">${genre.label}</p>
            ${pieces.map(makePieceHtml).join('')}
          </div>`;
        }
        html += '</div>';
        wrap.innerHTML = html;

      } catch (err) {
        document.getElementById('piece-list').innerHTML =
          `<div class="error">Could not load piece list. Please try refreshing the page.<br><small>${err.message}</small></div>`;
        console.error(err);
      }
    }

    loadPieces();
  </script>

</body>
</html>
